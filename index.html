<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="theme-color" content="#0f0f13" />
  <title>My Transcriber</title>
  <link rel="manifest" href="data:application/json,{&quot;name&quot;:&quot;My Transcriber&quot;,&quot;short_name&quot;:&quot;Transcriber&quot;,&quot;start_url&quot;:&quot;.&quot;,&quot;display&quot;:&quot;standalone&quot;,&quot;background_color&quot;:&quot;%230f0f13&quot;,&quot;theme_color&quot;:&quot;%230f0f13&quot;}" />
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f13;
      --surface:   #1a1a23;
      --surface2:  #22222e;
      --border:    #2e2e3e;
      --accent:    #6c63ff;
      --accent-h:  #8880ff;
      --success:   #22c55e;
      --danger:    #ef4444;
      --text:      #e8e8f0;
      --text-dim:  #888899;
      --radius:    12px;
      --radius-sm: 8px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Screens ── */
    .screen {
      display: none;
      width: 100%;
      min-height: 100dvh;
    }
    .screen.active { display: flex; }

    /* ── Password screen ── */
    #lock-screen {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 24px;
    }

    .lock-icon {
      width: 72px; height: 72px;
      background: var(--surface2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--border);
    }
    .lock-icon svg { width: 32px; height: 32px; color: var(--accent); }

    .lock-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .lock-card h1 {
      font-size: 1.4rem;
      font-weight: 700;
      text-align: center;
      letter-spacing: -0.02em;
    }

    .lock-card p {
      text-align: center;
      color: var(--text-dim);
      font-size: 0.875rem;
    }

    .input-group {
      position: relative;
    }

    input[type="password"], input[type="text"] {
      width: 100%;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 1rem;
      padding: 13px 44px 13px 14px;
      outline: none;
      transition: border-color 0.2s;
      -webkit-appearance: none;
    }
    input[type="password"]:focus, input[type="text"]:focus {
      border-color: var(--accent);
    }

    .toggle-pw {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: var(--text-dim); cursor: pointer;
      padding: 4px;
      display: flex; align-items: center;
    }
    .toggle-pw:hover { color: var(--text); }

    .error-msg {
      color: var(--danger);
      font-size: 0.8rem;
      text-align: center;
      min-height: 1.2em;
    }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 0.9375rem;
      font-weight: 600;
      padding: 13px 20px;
      transition: opacity 0.15s, transform 0.1s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    .btn-primary { background: var(--accent); color: #fff; width: 100%; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-h); }

    .btn-secondary {
      background: var(--surface2);
      color: var(--text);
      border: 1.5px solid var(--border);
      flex: 1;
    }
    .btn-secondary:hover:not(:disabled) { background: var(--border); }

    .btn-success { background: var(--success); color: #fff; flex: 1; }
    .btn-success:hover:not(:disabled) { background: #16a34a; }

    /* ── Main screen ── */
    #main-screen {
      flex-direction: column;
      align-items: center;
      padding: 0 0 40px;
    }

    header {
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      display: flex; align-items: center; gap: 10px;
    }
    header h1 svg { color: var(--accent); }

    .main-content {
      width: 100%;
      max-width: 680px;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* ── Upload zone ── */
    .upload-zone {
      background: var(--surface);
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 36px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      text-align: center;
    }
    .upload-zone:hover, .upload-zone.dragover {
      border-color: var(--accent);
      background: rgba(108, 99, 255, 0.06);
    }
    .upload-zone svg { color: var(--accent); width: 40px; height: 40px; }
    .upload-zone .upload-title { font-weight: 600; font-size: 1rem; }
    .upload-zone .upload-sub { color: var(--text-dim); font-size: 0.8125rem; }
    #file-input { display: none; }

    /* ── File info card ── */
    .file-info {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      display: none;
      align-items: center;
      gap: 14px;
    }
    .file-info.visible { display: flex; }
    .file-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      background: rgba(108,99,255,0.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: var(--accent);
    }
    .file-icon svg { width: 22px; height: 22px; }
    .file-details { flex: 1; overflow: hidden; }
    .file-name {
      font-weight: 600;
      font-size: 0.9375rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-meta { color: var(--text-dim); font-size: 0.8rem; margin-top: 2px; }

    .remove-file {
      background: none; border: none;
      color: var(--text-dim); cursor: pointer;
      padding: 6px; border-radius: 6px;
      display: flex; align-items: center;
      transition: color 0.15s, background 0.15s;
    }
    .remove-file:hover { color: var(--danger); background: rgba(239,68,68,0.1); }

    /* ── Progress ── */
    .progress-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 18px;
      display: none;
      flex-direction: column;
      gap: 12px;
    }
    .progress-wrap.visible { display: flex; }

    .progress-header {
      display: flex; align-items: center; gap: 10px;
      font-weight: 600; font-size: 0.9375rem;
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2.5px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .progress-bar-track {
      background: var(--surface2);
      border-radius: 999px;
      height: 6px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 999px;
      transition: width 0.4s ease;
      width: 0%;
    }
    .progress-label {
      color: var(--text-dim);
      font-size: 0.8rem;
    }

    /* ── Action row ── */
    .action-row {
      display: flex;
      gap: 10px;
    }

    /* ── Transcript area ── */
    .transcript-wrap {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .transcript-label {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    #transcript {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.9375rem;
      line-height: 1.7;
      min-height: 240px;
      max-height: 50vh;
      overflow-y: auto;
      padding: 16px;
      resize: vertical;
      width: 100%;
      outline: none;
      transition: border-color 0.2s;
      font-family: inherit;
    }
    #transcript:focus { border-color: var(--accent); }
    #transcript::placeholder { color: var(--text-dim); }

    /* Scrollbar */
    #transcript::-webkit-scrollbar { width: 6px; }
    #transcript::-webkit-scrollbar-track { background: transparent; }
    #transcript::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 20px;
      font-size: 0.875rem;
      font-weight: 500;
      white-space: nowrap;
      z-index: 100;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), opacity 0.3s;
      opacity: 0;
      pointer-events: none;
      display: flex; align-items: center; gap: 8px;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error   { border-color: var(--danger);  color: var(--danger); }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .main-content { padding: 16px 14px; gap: 16px; }
      header { padding: 14px 16px; }
      .upload-zone { padding: 28px 16px; }
      #transcript { min-height: 180px; }
    }
  </style>
</head>

<script>
(function () {
  "use strict";

  /* ── DOM refs ── */
  const lockScreen    = document.getElementById("lock-screen");
  const mainScreen    = document.getElementById("main-screen");
  const pwInput       = document.getElementById("pw-input");
  const pwToggle      = document.getElementById("pw-toggle");
  const eyeIcon       = document.getElementById("eye-icon");
  const pwSubmit      = document.getElementById("pw-submit");
  const pwError       = document.getElementById("pw-error");
  const lockBtn       = document.getElementById("lock-btn");

  const uploadZone    = document.getElementById("upload-zone");
  const fileInput     = document.getElementById("file-input");
  const fileInfoEl    = document.getElementById("file-info");
  const fileNameEl    = document.getElementById("file-name");
  const fileMetaEl    = document.getElementById("file-meta");
  const removeFileBtn = document.getElementById("remove-file");
  const transcribeBtn = document.getElementById("transcribe-btn");
  const progressWrap  = document.getElementById("progress-wrap");
  const progressText  = document.getElementById("progress-text");
  const progressFill  = document.getElementById("progress-fill");
  const progressLabel = document.getElementById("progress-label");
  const transcriptEl  = document.getElementById("transcript");
  const copyBtn       = document.getElementById("copy-btn");
  const clearBtn      = document.getElementById("clear-btn");
  const toastEl       = document.getElementById("toast");

  let selectedFile = null;
  let toastTimer   = null;

  /* ── Auth ── */
  function showScreen(id) {
    document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
    document.getElementById(id).classList.add("active");
  }

  function isAuthenticated() {
    return localStorage.getItem(SESSION_KEY) === "1";
  }

  function authenticate() {
    localStorage.setItem(SESSION_KEY, "1");
    showScreen("main-screen");
  }

  function lock() {
    localStorage.removeItem(SESSION_KEY);
    showScreen("lock-screen");
    pwInput.value = "";
    pwError.textContent = "";
  }

  /* ── Password UI ── */
  pwToggle.addEventListener("click", () => {
    const isHidden = pwInput.type === "password";
    pwInput.type = isHidden ? "text" : "password";
    eyeIcon.innerHTML = isHidden
      ? `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>`
      : `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
  });

  function tryUnlock() {
    const val = pwInput.value.trim();
    if (!val) { pwError.textContent = "Please enter the password."; return; }
    if (val === APP_PASSWORD) {
      pwError.textContent = "";
      authenticate();
    } else {
      pwError.textContent = "Incorrect password. Try again.";
      pwInput.value = "";
      pwInput.focus();
    }
  }

  pwSubmit.addEventListener("click", tryUnlock);
  pwInput.addEventListener("keydown", e => { if (e.key === "Enter") tryUnlock(); });
  lockBtn.addEventListener("click", lock);

  /* ── File selection ── */
  uploadZone.addEventListener("click", () => fileInput.click());
  uploadZone.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") fileInput.click(); });

  uploadZone.addEventListener("dragover", e => { e.preventDefault(); uploadZone.classList.add("dragover"); });
  uploadZone.addEventListener("dragleave", () => uploadZone.classList.remove("dragover"));
  uploadZone.addEventListener("drop", e => {
    e.preventDefault();
    uploadZone.classList.remove("dragover");
    const f = e.dataTransfer.files[0];
    if (f) handleFile(f);
  });

  fileInput.addEventListener("change", () => {
    if (fileInput.files[0]) handleFile(fileInput.files[0]);
  });

  removeFileBtn.addEventListener("click", clearFile);

  function handleFile(file) {
    selectedFile = file;
    fileNameEl.textContent = file.name;
    fileMetaEl.textContent = formatSize(file.size) + " • Loading duration…";
    fileInfoEl.classList.add("visible");
    transcribeBtn.disabled = false;
    getAudioDuration(file).then(dur => {
      fileMetaEl.textContent = formatSize(file.size) + (dur ? " • " + formatDuration(dur) : "");
    });
  }

  function clearFile() {
    selectedFile = null;
    fileInput.value = "";
    fileInfoEl.classList.remove("visible");
    transcribeBtn.disabled = true;
  }

  function formatSize(bytes) {
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
    return (bytes / (1024 * 1024)).toFixed(2) + " MB";
  }

  function formatDuration(secs) {
    const h = Math.floor(secs / 3600);
    const m = Math.floor((secs % 3600) / 60);
    const s = Math.floor(secs % 60);
    if (h > 0) return `${h}:${String(m).padStart(2,"0")}:${String(s).padStart(2,"0")}`;
    return `${m}:${String(s).padStart(2,"0")}`;
  }

  function getAudioDuration(file) {
    return new Promise(resolve => {
      const url = URL.createObjectURL(file);
      const audio = new Audio();
      audio.preload = "metadata";
      audio.onloadedmetadata = () => { URL.revokeObjectURL(url); resolve(audio.duration); };
      audio.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
      audio.src = url;
    });
  }

  /* ── Transcription ── */
  transcribeBtn.addEventListener("click", transcribe);

  const CHUNK_LIMIT = 24 * 1024 * 1024; // 24 MB — stay under Whisper's 25 MB limit
  const CHUNK_SAMPLE_RATE = 16000;       // 16 kHz mono is ideal for speech recognition

  // Encode a Float32Array of mono samples as a WAV Blob
  function encodeWAV(samples, sampleRate) {
    const numSamples = samples.length;
    const buffer = new ArrayBuffer(44 + numSamples * 2);
    const view = new DataView(buffer);
    const writeStr = (off, s) => { for (let i = 0; i < s.length; i++) view.setUint8(off + i, s.charCodeAt(i)); };
    writeStr(0, "RIFF");
    view.setUint32(4, 36 + numSamples * 2, true);
    writeStr(8, "WAVE");
    writeStr(12, "fmt ");
    view.setUint32(16, 16, true);
    view.setUint16(20, 1, true);   // PCM
    view.setUint16(22, 1, true);   // mono
    view.setUint32(24, sampleRate, true);
    view.setUint32(28, sampleRate * 2, true);
    view.setUint16(32, 2, true);
    view.setUint16(34, 16, true);
    writeStr(36, "data");
    view.setUint32(40, numSamples * 2, true);
    let off = 44;
    for (let i = 0; i < numSamples; i++) {
      const s = Math.max(-1, Math.min(1, samples[i]));
      view.setInt16(off, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
      off += 2;
    }
    return new Blob([buffer], { type: "audio/wav" });
  }

  // Decode audio file and resample to mono 16 kHz
  async function decodeAudio(file) {
    const arrayBuffer = await file.arrayBuffer();
    const audioCtx = new AudioContext();
    const decoded = await audioCtx.decodeAudioData(arrayBuffer);
    await audioCtx.close();
    const duration = decoded.duration;
    const offCtx = new OfflineAudioContext(1, Math.ceil(CHUNK_SAMPLE_RATE * duration), CHUNK_SAMPLE_RATE);
    const src = offCtx.createBufferSource();
    src.buffer = decoded;
    src.connect(offCtx.destination);
    src.start(0);
    return await offCtx.startRendering();
  }

  // Send a single Blob to Whisper API and return transcript text
  async function whisperRequest(blob, filename) {
    const formData = new FormData();
    formData.append("file", blob, filename);
    formData.append("model", "whisper-1");
    formData.append("response_format", "text");
    const res = await fetch("https://api.openai.com/v1/audio/transcriptions", {
      method: "POST",
      headers: { Authorization: "Bearer " + OPENAI_API_KEY },
      body: formData,
    });
    if (!res.ok) {
      let msg = `API error ${res.status}`;
      try { const err = await res.json(); msg = err?.error?.message || msg; } catch (_) {}
      throw new Error(msg);
    }
    return (await res.text()).trim();
  }

  async function transcribe() {
    if (!selectedFile) return;

    if (!OPENAI_API_KEY) {
      showToast("No API key configured. Edit the OPENAI_API_KEY constant at the top of index.html.", "error");
      return;
    }

    setTranscribing(true);
    progressFill.style.width = "0%";
    progressText.textContent = "Preparing file…";
    progressLabel.textContent = "This may take a moment for longer recordings.";
    transcriptEl.value = "";

    try {
      let fullText;

      if (selectedFile.size <= CHUNK_LIMIT) {
        // ── Small file: send directly ──────────────────────────────────────
        animateProgress(0, 55, 2000);
        progressText.textContent = "Sending to Whisper…";
        animateProgress(55, 85, 8000);
        progressText.textContent = "Transcribing…";
        fullText = await whisperRequest(selectedFile, selectedFile.name);
        animateProgress(85, 100, 600);

      } else {
        // ── Large file: decode → chunk → transcribe each chunk ─────────────
        progressText.textContent = "Decoding audio…";
        progressLabel.textContent = "Resampling large file before splitting.";
        animateProgress(0, 10, 3000);

        const audioBuffer = await decodeAudio(selectedFile);
        const allSamples = audioBuffer.getChannelData(0);
        const totalSamples = allSamples.length;

        // Max samples that fit in CHUNK_LIMIT as 16-bit PCM WAV
        const maxSamplesPerChunk = Math.floor((CHUNK_LIMIT - 44) / 2);
        const numChunks = Math.ceil(totalSamples / maxSamplesPerChunk);

        const chunkDurationSecs = maxSamplesPerChunk / CHUNK_SAMPLE_RATE;
        const totalDurationMins = Math.round(totalSamples / CHUNK_SAMPLE_RATE / 60);
        progressLabel.textContent = `Splitting into ${numChunks} chunks (~${Math.round(chunkDurationSecs / 60)} min each).`;

        const parts = [];
        for (let i = 0; i < numChunks; i++) {
          const pctStart = 10 + (i / numChunks) * 85;
          const pctEnd   = 10 + ((i + 1) / numChunks) * 85;
          progressText.textContent = `Transcribing chunk ${i + 1} of ${numChunks}…`;
          animateProgress(pctStart, pctEnd - 2, Math.max(3000, chunkDurationSecs * 200));

          const start = i * maxSamplesPerChunk;
          const end   = Math.min(start + maxSamplesPerChunk, totalSamples);
          const chunk = allSamples.slice(start, end);
          const blob  = encodeWAV(chunk, CHUNK_SAMPLE_RATE);
          parts.push(await whisperRequest(blob, `chunk_${i + 1}.wav`));

          animateProgress(pctEnd - 2, pctEnd, 400);
        }

        fullText = parts.join(" ");
        animateProgress(95, 100, 400);
      }

      transcriptEl.value = fullText;
      transcriptEl.removeAttribute("readonly");
      copyBtn.disabled = false;
      clearBtn.disabled = false;
      progressText.textContent = "Done!";
      progressFill.style.width = "100%";
      showToast("Transcription complete.", "success");
      setTimeout(() => setTranscribing(false), 800);

    } catch (err) {
      console.error(err);
      progressWrap.classList.remove("visible");
      showToast("Error: " + err.message, "error");
      setTranscribing(false);
    }
  }

  let progressAnim = null;
  function animateProgress(from, to, duration) {
    if (progressAnim) cancelAnimationFrame(progressAnim);
    const start = performance.now();
    const current = parseFloat(progressFill.style.width) || from;
    function step(now) {
      const t = Math.min(1, (now - start) / duration);
      const eased = 1 - Math.pow(1 - t, 3);
      progressFill.style.width = (current + (to - current) * eased) + "%";
      if (t < 1) progressAnim = requestAnimationFrame(step);
    }
    progressAnim = requestAnimationFrame(step);
  }

  function setTranscribing(active) {
    transcribeBtn.disabled = active;
    uploadZone.style.pointerEvents = active ? "none" : "";
    removeFileBtn.disabled = active;
    if (active) {
      progressWrap.classList.add("visible");
    } else {
      setTimeout(() => progressWrap.classList.remove("visible"), 600);
    }
  }

  /* ── Copy & Clear ── */
  copyBtn.addEventListener("click", async () => {
    const text = transcriptEl.value;
    if (!text) return;
    try {
      await navigator.clipboard.writeText(text);
      showToast("Copied to clipboard!", "success");
    } catch (_) {
      // Fallback for Safari
      transcriptEl.removeAttribute("readonly");
      transcriptEl.select();
      document.execCommand("copy");
      showToast("Copied to clipboard!", "success");
    }
  });

  clearBtn.addEventListener("click", () => {
    transcriptEl.value = "";
    transcriptEl.setAttribute("readonly", "");
    copyBtn.disabled = true;
    clearBtn.disabled = true;
  });

  /* ── Toast ── */
  function showToast(msg, type = "") {
    toastEl.textContent = msg;
    toastEl.className = "toast" + (type ? " " + type : "") + " show";
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toastEl.classList.remove("show"); }, 3200);
  }

  /* ── Init ── */
  if (isAuthenticated()) {
    showScreen("main-screen");
  } else {
    showScreen("lock-screen");
    setTimeout(() => pwInput.focus(), 100);
  }

})();
</script>
</body>
</html>
